skills:
  - name: stop-slop
    steps:
      - type: git-export
        url: https://github.com/hardikpandya/stop-slop

  - name: aleph
    steps:
      - type: uv-pip
        packages:
          - aleph-rlm[mcp]
      - type: download
        url: https://raw.githubusercontent.com/Hmbown/aleph/refs/heads/main/docs/prompts/aleph.md
        dest: SKILL.md

  - name: changelog
    steps:
      - type: git-export
        url: https://github.com/sickn33/antigravity-awesome-skills/skills/changelog-automation

  - name: agent-browser
    steps:
      - type: git-export
        url: https://github.com/vercel-labs/agent-browser/tree/main/skills/agent-browser

  - name: caveman
    steps:
      - type: git-export
        repo: JuliusBrussee/caveman
        path: skills/caveman

  - name: caveman-commit
    steps:
      - type: git-export
        repo: JuliusBrussee/caveman
        path: skills/caveman-commit

  - name: caveman-review
    steps:
      - type: git-export
        repo: JuliusBrussee/caveman
        path: skills/caveman-review

  - name: caveman-help
    steps:
      - type: git-export
        repo: JuliusBrussee/caveman
        path: skills/caveman-help

  - name: caveman-stats
    steps:
      - type: git-export
        repo: JuliusBrussee/caveman
        path: skills/caveman-stats

  - name: caveman-compress
    steps:
      - type: git-export
        repo: JuliusBrussee/caveman
        path: skills/caveman-compress

  - name: cavecrew
    steps:
      - type: git-export
        repo: JuliusBrussee/caveman
        path: skills/cavecrew
